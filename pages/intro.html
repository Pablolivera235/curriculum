    <div class="container_int">
        <div class="cont_pic_int"> <img src="../img/perfil.jpg" alt=""> </div>
        <div class="int">
        <h2> - Introducción - </h2>
        <div id="desc_int" class="desc_int"> <p id="press"> Hola!, soy Pablo Olivera, tengo 22 años. <br> Soy <span class="uy"> Uruguayo </span>, me gusta el futbol, la <span class="music"> musica </span>y la programación <br> soy muy fan de los <span class="games">videojuegos</span> </p> </div>

    <h1> Pablo Olivera </h1>
    <div class="popup"> Prueba hacer clic en las palabras <span style="font-weight: bolder;"> Resaltadas </span></div>
    <div class="popup2"> Si te interesaron mis gustos clickea de nuevo</div>

   
  
    <script src="https://threejs.org/build/three.js"></script>
    <script src="../scripts/script.js" type="module"></script>
    <script src="../scripts/script.js"> </script>


    <script>
        //Esta funcion crea una imagen si se hace clic en una palabra
        //Nota: "ur" es opcional, es para cargar un url al cliquear una imagen popup
        
        function imgspawn(x, r, ur) {
        var l = r;
        const uy = document.querySelector(`.${l}`);
        const div = document.getElementById('desc_int');
        const press = document.getElementById('press');
        const nimg = document.createElement('img');
        var y = x;

         nimg.src = `../img/${y}`;

         div.appendChild(nimg);
         nimg.classList.add('nimg')
         nimg.classList.add('ocultar');

         if(l == 'uy'){
            nimg.classList.add('redondear');
         }

         if(l == 'games' || l == 'music'){
            nimg.classList.add('games');
         }
         
         nimg.addEventListener('click', () =>{
            if(ur != null){
            url = ur;
            window.open(url);
            }
         });

         uy.addEventListener('click', () =>{
            nimg.classList.remove('ocultar');
            press.classList.add('ocultar');

            setTimeout(() =>{
                nimg.classList.add('ocultar');},1500
            );

            setTimeout(() =>{
                press.classList.remove('ocultar');},1500
            );
         });
        
         console.log('funcional');
         console.log(l);
         console.log(r);


         /* no funcionó: 
         uy.addEventListener('mouseleave', () =>{
            nimg.style.display='none'; 
         }); */
        }

        //imgspawn('uruguay.png','uy'); donde 'uruguay.png' es la imagen, y 'uy' es la clase del span donde hay que poner el mouse para que aparezca
       
        // Palablra: Uruguayo{
        imgspawn('uruguay.png','uy');
        imgspawn('auf.png','uy');
        imgspawn('mate.png','uy');
        //}

        //Palabra: Juegos{
        imgspawn('games.png','games', 'https://profile.playstation.com/Pablolivera-235');       
        //}

        //Palabra: Música{
        imgspawn('songs.png','music', 'https://youtube.com/playlist?list=PLT-RmV3byZfoAHkZdEjTOTenFPGxh9xnX&si=rPjdgoZz9tvp1D2q');
        //}

        //Nota: probar z-index negativos para los objetos 3D, así no interfieren con el resto de onjetos en pantalla
    </script>
