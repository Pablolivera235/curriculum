     <!-- este script crea el objeto 3D -->
    <script type="module">
     import { tresD } from "../scripts/script.js";
    //tresD( en nombre va el nombre del gtlf ej: 'nombre', y aquí el del id del div donde va el objeto ej: 'container3D', y aqui va el tamaño ej: 2);
    tresD('musica', 'TDcontainer', 10, 10, 20);
    </script>

    <script>
        function imgspawn(x) {
        const uy = document.querySelector('.uy');
        const div = document.getElementById('desc_int');
        const nimg = document.createElement('img');
        var y = x;

         nimg.src = `../img/${y}`;

         div.appendChild(nimg);
         nimg.classList.add('nimg')
         nimg.classList.add('ocultar');

         uy.addEventListener('mouseenter', () =>{
            nimg.classList.remove('ocultar');

            setTimeout(() =>{
                nimg.classList.add('ocultar');},1500);
         });
        
        
         /*uy.addEventListener('mouseleave', () =>{
            nimg.style.display='none'; 
         }); */

         console.log('funcional');
        }

        imgspawn('uruguay.png');
    </script>
