<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/logotipo.png">
    <title>Tienda | Inicio</title>
</head>

<body>
    <nav>
        <div style="display: flex; align-items: center;">
            <button id="btn-volver"
                style="display: none; background-color: #3700b3; color: white; border: none; border-radius: 50%; width: 2rem; height: 2.1rem; cursor: pointer; justify-content: center; align-items: center; margin-right: 1rem; transition: background-color 0.3s; padding: 0;">
                <svg xmlns="http://www.w3.org/2000/svg" width="1rem" height="1rem" fill="currentColor"
                    viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                </svg>
            </button>
            <img class="logo" style="margin-left: 0;" src="./assets/logotipo.png" onclick="location.href='./index.html'"
                alt="logo">
        </div>
        <div class="div_buscar">
            <input id="input-buscar" class="input_buscar" type="text" placeholder="Buscar productos...">
            <button id="btn-buscar">Buscar</button>
        </div>
        <ul class="menu_registro_carrito">
            <li><img src="./assets/iconos/user.png" alt="usuario" onclick="location.href='./registro.html'"></li>
            <li> <img src="./assets/iconos/carrito.png" alt="carrito" id="cart-icon" style="cursor: pointer;"></li>
            <li><img src="./assets/iconos/envio.png" alt="envio" onclick="location.href='./envio.html'"></li>
        </ul>
    </nav>
    <section id="seccion-publicidad" class="contenedor_publicidad">
        <img src="./assets/publicidad.webp" alt="publicidad">
        <div class="publicidad">
            <div class="flechas derecha">
                <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 16 16"
                    width="25" height="25">
                    <path d="M5 15L12 8L5 1" stroke-width="2" stroke-miterlimit="10" stroke-linecap="round"
                        stroke-linejoin="round" stroke="currentColor" fill="none"></path>
                </svg>
            </div>
            <div class="flechas izquierda">
                <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 16 16"
                    width="25" height="25">
                    <path d="M11 1L4 8L11 15" stroke-width="2" stroke-miterlimit="10" stroke-linecap="round"
                        stroke-linejoin="round" stroke="currentColor" fill="none"></path>
                </svg>
            </div>
        </div>

    </section>

    <section id="seccion-categorias" class="contenedor_categorias">
        <ul class="menu_categorias">
            <li><img src="./assets/iconos/todos.png" alt="todos"></li>
            <li><img src="./assets/iconos/congelados.png" alt="congelados"></li>
            <li><img src="./assets/iconos/carne.png" alt="carne"></li>
            <li><img src="./assets/iconos/almacen.png" alt="almacen"></li>
            <li><img src="./assets/iconos/bebida.png" alt="bebidas"></li>
            <li><img src="./assets/iconos/limpieza.png" alt="limpieza"></li>
            <li><img src="./assets/iconos/highiene.png" alt="higiene"></li>
            <li><img src="./assets/iconos/mascotas.png" alt="mascotas"></li>
            <li><img src="./assets/iconos/verduras.png" alt="verduras"></li>
            <li><img src="./assets/iconos/frutas.png" alt="frutas"></li>
            <li><img src="./assets/iconos/panaderia.png" alt="panadería"></li>
            <li><img src="./assets/iconos/electrodomesticos.png" alt="electrodomésticos"></li>
        </ul>
    </section>

    <section id="contenedor-productos" class="contenedor_productos">
    </section>

    <!-- Carrito Drawer -->
    <div id="carrito-drawer" class="carrito_drawer">
        <div class="ticket">
            <div class="ticket_header">
                <h2>TICKET DE COMPRA</h2>
                <button id="cerrar-carrito" class="btn_cerrar">&times;</button>
            </div>
            <div class="ticket_divider"></div>
            <div id="lista-carrito" class="ticket_items">
                <!-- Los productos se cargarán aquí -->
            </div>
            <div class="ticket_divider"></div>
            <div class="ticket_total">
                <span>TOTAL:</span>
                <span id="total-carrito">$0</span>
            </div>
            <button class="btn_finalizar">FINALIZAR COMPRA</button>
        </div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .menu_registro_carrito img {
            width: 1.5rem;
        }

        .producto button {
            position: absolute;
            bottom: 1rem;
            background-color: #3700b3;
            color: white;
            border: none;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .producto button:hover {
            background-color: #bb86fc;
            color: #121212;
        }

        .contenedor_productos {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 2rem;
            flex-wrap: wrap;
            gap: 2rem;
            width: 93%;
            height: fit-content;
        }

        .producto {
            position: relative;
            border: solid 2px white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 11rem;
            height: 20rem;
            margin-top: 2rem;
            border-radius: 1rem;
            padding: 1rem 0;
        }

        .contenedor_publicidad {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            width: 100%;
            height: 20rem;
        }

        .contenedor_publicidad img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .flechas {
            position: absolute;
            justify-content: center;
            align-items: center;
            display: flex;
            padding: .5rem;
            border-radius: .5rem;
            border: solid 3px;
        }

        .derecha {
            right: 6rem;
        }

        .izquierda {
            left: 6rem;
        }

        .publicidad {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 93%;
            height: 100%;
            border-radius: 1rem;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background-color: #121212;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .logo {
            margin-left: 25%;
            width: 3.5rem;
        }

        nav {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 70px;
            background-color: #1e1e1e;
            padding: 0 2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid #333;
        }

        nav>div,
        nav>ul {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        nav>div:first-child {
            justify-content: flex-start;
            padding-left: 1rem;
        }

        #btn-volver:hover {
            background-color: #bb86fc;
            color: #121212;
        }

        nav>ul {
            justify-content: flex-end;
            list-style: none;
            gap: 1.5rem;
        }

        .input_buscar {
            width: 40rem;
            padding: 0.5rem;
            border: 1px solid #444;
            border-radius: 4px 0 0 4px;
            background-color: #2c2c2c;
            color: white;
        }

        nav button {
            padding: 0.5rem 1rem;
            border: 1px solid #444;
            border-left: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            background-color: #3700b3;
            color: white;
        }

        .menu_registro_carrito a {
            text-decoration: none;
            color: #b0b0b0;
            font-weight: 500;
        }

        .menu_registro_carrito a:hover {
            color: #bb86fc;
        }

        .div_buscar {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 50%;
        }

        .contenedor_categorias {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 9rem;
            /*border: solid 2px white;*/
            margin-top: 1rem;
        }

        .menu_categorias {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            width: 85%;
            height: 100%;
            list-style: none;
            gap: 2rem;
            overflow-x: auto;
            scrollbar-width: none;
            /*border: solid 2px white;*/
            border-radius: 1rem;
        }

        .menu_categorias::-webkit-scrollbar {
            display: none;
        }

        .menu_categorias li {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 7rem;
            height: 7rem;
            flex-shrink: 0;
            border: solid 2px white;
            border-radius: 50%;
            background-color: #1e1e1e;
            transition: transform 0.3s, border-color 0.3s;
        }

        .menu_categorias li a {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .menu_categorias li:hover {
            transform: scale(1.1);
            border-color: #ffffff;
        }

        .menu_categorias a {
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            text-align: center;
            padding: 0.5rem;
            font-weight: bold;
        }

        /* Estilos del Carrito Drawer y Ticket */
        .carrito_drawer {
            position: fixed;
            top: 0;
            right: -30%;
            width: 30%;
            height: 100vh;
            background-color: white;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
            transition: right 0.3s ease-in-out;
            z-index: 1000;
            color: black;
            font-family: 'Courier New', Courier, monospace;
            padding: 2rem 1.5rem;
            overflow-y: auto;
        }

        .carrito_drawer.active {
            right: 0;
        }

        .ticket {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ticket_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            border-bottom: 2px dashed #000;
            padding-bottom: 0.5rem;
        }

        .ticket_header h2 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin: 0;
            flex-grow: 1;
        }

        .btn_cerrar {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #000;
            line-height: 1;
        }

        .ticket_items {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem 0;
        }

        .item_carrito {
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 0.5rem;
        }

        .item_info {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .item_codigo {
            font-size: 0.75rem;
            color: #555;
        }

        .ticket_divider {
            border-top: 2px dashed #000;
            margin: 0.5rem 0;
        }

        .ticket_total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 900;
            padding-top: 0.5rem;
        }

        .btn_finalizar {
            margin-top: 2rem;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        .btn_finalizar:hover {
            opacity: 0.8;
        }

        .footer {
            font-weight: bolder;
            height: 13rem;
            border-top: solid #323232;
            width: 100vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            background-color: #171717;
        }

        .footer_logo {
            width: 10rem;
        }

        .footer_logo img {
            width: 100%;
        }

        .footer_info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        @media screen and (max-width: 768px) {
            .carrito_drawer {
                width: 80%;
                right: -80%;
            }
        }
    </style>

    <script src="./BD/productos.js"></script>
    <script src="./BD/carrito.js"></script>
    <script>
        const contenedor = document.getElementById('contenedor-productos');
        const enlacesCategorias = document.querySelectorAll('.menu_categorias li');
        const inputBuscar = document.getElementById('input-buscar');
        const btnBuscar = document.getElementById('btn-buscar');
        const seccionPublicidad = document.getElementById('seccion-publicidad');
        const seccionCategorias = document.getElementById('seccion-categorias');
        const btnVolver = document.getElementById('btn-volver');

        function mostrarProductos(productosAFiltrar, titulo = "") {
            contenedor.innerHTML = '';

            if (titulo) {
                const h1 = document.createElement('h1');
                h1.innerText = titulo;
                h1.style.width = '100%';
                h1.style.textAlign = 'center';
                h1.style.margin = '2rem 0 0 0';
                contenedor.appendChild(h1);
            }

            if (productosAFiltrar.length === 0) {
                contenedor.innerHTML += '<p style="grid-column: 1/-1; text-align: center; font-size: 1.2rem; margin-top: 2rem;">No se encontraron productos.</p>';
                return;
            }
            productosAFiltrar.forEach(producto => {
                const div = document.createElement('div');
                div.className = 'producto';
                div.innerHTML = `
                    <img src="${producto.portada}" alt="${producto.nombre}" style="margin-top: -2rem; max-width: 90%; max-height: 50%; object-fit: contain;">
                    <h2 style="font-size: 1.1rem; text-align: center; margin: 1rem 0rem .5rem;">${producto.nombre}</h2>
                    <p style="font-weight: bold; color: #bb86fc;">$${producto.precio}</p>
                    <button onclick="agregarAlCarrito(${producto.id})">Agregar al carrito</button>
                `;
                contenedor.appendChild(div);
            });
        }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            if (producto) {
                carrito.push({
                    nombre: producto.nombre,
                    precio: producto.precio,
                    codigo_barras: producto.codigo_barras
                });

                localStorage.setItem('carrito', JSON.stringify(carrito));

                actualizarCarritoUI();

                drawer.classList.add('active');
            }
        }

        const drawer = document.getElementById('carrito-drawer');
        const btnCerrar = document.getElementById('cerrar-carrito');
        const cartIcon = document.getElementById('cart-icon');
        const listaCarrito = document.getElementById('lista-carrito');
        const totalCarrito = document.getElementById('total-carrito');

        function actualizarCarritoUI() {
            listaCarrito.innerHTML = '';
            let total = 0;

            carrito.forEach((item, index) => {
                total += item.precio;
                const div = document.createElement('div');
                div.className = 'item_carrito';
                div.innerHTML = `
                    <div class="item_info">
                        <span>${item.nombre}</span>
                        <span>$${item.precio}</span>
                    </div>
                    <span class="item_codigo">Cód: ${item.codigo_barras}</span>
                    <button onclick="eliminarDelCarrito(${index})" style="background: none; border: none; font-size: 0.7rem; text-decoration: underline; cursor: pointer; text-align: left; padding: 0; margin-top: 0.2rem;">Eliminar</button>
                `;
                listaCarrito.appendChild(div);
            });

            totalCarrito.innerText = `$${total}`;
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            actualizarCarritoUI();
        }

        cartIcon.addEventListener('click', () => {
            drawer.classList.add('active');
            actualizarCarritoUI();
        });

        btnCerrar.addEventListener('click', () => {
            drawer.classList.remove('active');
        });

        actualizarCarritoUI();

        function filtrarProductos() {
            const termino = inputBuscar.value.toLowerCase().trim();

            if (termino === '') {
                seccionPublicidad.style.display = 'flex';
                seccionCategorias.style.display = 'flex';
                btnVolver.style.display = 'none';
                mostrarProductos(productos);
                return;
            }

            seccionPublicidad.style.display = 'none';
            seccionCategorias.style.display = 'none';
            btnVolver.style.display = 'flex';

            const productosFiltrados = productos.filter(producto =>
                producto.nombre.toLowerCase().includes(termino) ||
                producto.categoria.toLowerCase().includes(termino)
            );

            mostrarProductos(productosFiltrados, "Resultados de la Búsqueda:");
        }

        mostrarProductos(productos);

        btnVolver.addEventListener('click', () => {
            location.reload();
        });

        btnBuscar.addEventListener('click', filtrarProductos);
        inputBuscar.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                filtrarProductos();
            }
        });

        enlacesCategorias.forEach(item => {
            item.addEventListener('click', () => {
                const img = item.querySelector('img');
                const categoriaSeleccionada = img ? img.alt.trim() : "";

                seccionPublicidad.style.display = 'flex';
                seccionCategorias.style.display = 'flex';
                inputBuscar.value = '';

                if (categoriaSeleccionada.toLowerCase() === 'todos') {
                    btnVolver.style.display = 'none';
                    mostrarProductos(productos);
                } else {
                    btnVolver.style.display = 'flex';
                    const productosFiltrados = productos.filter(producto =>
                        producto.categoria.toLowerCase() === categoriaSeleccionada.toLowerCase()
                    );
                    mostrarProductos(productosFiltrados, `Categoría: ${categoriaSeleccionada}`);
                }
            });
            item.style.cursor = 'pointer';
        });
    </script>
</body>
<footer>
    <div class="footer">
        <div class="footer_logo">
            <img src="./assets/logo.png" alt="logo">
        </div>
        <div class="footer_info">
            <p>Dirección: Av. Siempreviva 742</p>
            <p>Teléfono: 11-2345-6789</p>
            <p>Email: [EMAIL_ADDRESS]</p>
        </div>
    </div>
</footer>

</html>
