<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/logotipo.png">
    <title>Tienda | Iniciar Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Login Styles */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
            width: 100%;
            height: 100%;
            padding: 2rem;
        }

        .login-card {
            background-color: #1e1e1e;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h2 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
            font-weight: 700;
        }

        .login-card p {
            color: #b0b0b0;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            color: #bb86fc;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background-color: #2c2c2c;
            border: 1px solid #444;
            border-radius: 0.8rem;
            color: white;
            outline: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .form-group input:focus {
            border-color: #bb86fc;
            background-color: #333;
            box-shadow: 0 0 0 3px rgba(187, 134, 252, 0.2);
        }

        .forgot-password {
            display: block;
            text-align: right;
            margin-top: -0.5rem;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            color: #b0b0b0;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #bb86fc;
        }

        .login-button {
            width: 100%;
            padding: 1rem;
            background-color: #3700b3;
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(55, 0, 179, 0.3);
        }

        .login-button:hover {
            background-color: #bb86fc;
            color: #121212;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(187, 134, 252, 0.4);
        }

        .login-button:active {
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h2>HOLA!</h2>
            <p>Ingresa a tu cuenta para continuar</p>

            <form onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="usuario@ejemplo.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>

                <button type="button" class="login-button" onclick="location.href='./productos.html'">Iniciar
                    Sesión</button>
            </form>
        </div>
    </div>
</body>

</html>
