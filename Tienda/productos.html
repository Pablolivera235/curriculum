<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/logotipo.png">
    <title>Tienda | Administrar Productos</title>
</head>

<body>
    <nav>
        <div style="display: flex; align-items: center;">
            <button id="btn-volver-home" onclick="location.href='./index.html'"
                style="background-color: #3700b3; color: white; border: none; border-radius: 50%; width: 2.5rem; height: 2.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center; margin-right: 1rem; transition: background-color 0.3s; padding: 0;">
                <svg xmlns="http://www.w3.org/2000/svg" width="1.2rem" height="1.2rem" fill="currentColor"
                    viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 1 0 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                </svg>
            </button>
            <img class="logo" style="margin-left: 0; cursor: pointer;" src="./assets/logotipo.png"
                onclick="location.href='./index.html'" alt="logo">
        </div>
        <div class="div_buscar">
            <input id="input-buscar" class="input_buscar" type="text" placeholder="Buscar productos para gestionar...">
            <button id="btn-buscar">Buscar</button>
        </div>
        <ul class="menu_registro_carrito">
            <li><img src="./assets/iconos/user.png" alt="usuario" onclick="location.href='./registro.html'"
                    style="cursor:pointer"></li>
            <li><img src="./assets/iconos/envio.png" alt="envio" onclick="location.href='./envio.html'"
                    style="cursor:pointer"></li>
        </ul>
    </nav>

    <main class="admin_container">
        <!-- Sidebar: Agregar Producto -->
        <aside class="sidebar_add">
            <h2>NUEVO PRODUCTO</h2>
            <form id="form-nuevo-producto">
                <div class="form_group">
                    <label>Nombre:</label>
                    <input type="text" id="add-nombre" required>
                </div>
                <div class="form_group">
                    <label>Precio:</label>
                    <input type="number" id="add-precio" required>
                </div>
                <div class="form_group">
                    <label>Imagen (URL):</label>
                    <input type="text" id="add-imagen" placeholder="./assets/productos/nombre.png" required>
                </div>
                <div class="form_group">
                    <label>Cod. Barras:</label>
                    <input type="text" id="add-codigo" required>
                </div>
                <div class="form_group">
                    <label>Categoría:</label>
                    <select id="add-categoria">
                        <option value="Congelados">Congelados</option>
                        <option value="Carne">Carne</option>
                        <option value="Almacen">Almacén</option>
                        <option value="Limpieza">Limpieza</option>
                        <option value="Higiene">Higiene</option>
                        <option value="Bebida">Bebida</option>
                        <option value="Electrodomésticos">Electrodomésticos</option>
                    </select>
                </div>
                <div class="form_group">
                    <label>Descripción:</label>
                    <textarea id="add-descripcion" rows="3"></textarea>
                </div>
                <button type="submit" class="btn_guardar">GUARDAR PRODUCTO</button>
            </form>
            <div class="divider"></div>
            <div class="sync_section">
                <p>Para guardar los cambios permanentemente en el código:</p>
                <button onclick="sincronizarArchivoJS()" class="btn_sync">SINCRONIZAR CON ARCHIVO .JS</button>
            </div>
        </aside>

        <!-- Main Content: Lista de Productos -->
        <section class="main_productos">
            <h1 id="titulo-gestion">Gestión de Inventario</h1>
            <div id="contenedor-productos" class="contenedor_productos">
                <!-- Se cargan dinámicamente -->
            </div>
        </section>
    </main>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 70px;
            background-color: #1e1e1e;
            padding: 0 2rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            width: 3.5rem;
        }

        .div_buscar {
            display: flex;
            width: 40%;
        }

        .input_buscar {
            flex-grow: 1;
            padding: 0.5rem;
            border: 1px solid #444;
            border-radius: 4px 0 0 4px;
            background-color: #2c2c2c;
            color: white;
        }

        nav button#btn-buscar {
            padding: 0.5rem 1rem;
            border: 1px solid #444;
            border-left: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            background-color: #3700b3;
            color: white;
        }

        .menu_registro_carrito {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }

        .menu_registro_carrito img {
            width: 1.5rem;
        }

        .admin_container {
            display: flex;
            padding: 2rem;
            gap: 2rem;
        }

        /* Sidebar Style */
        .sidebar_add {
            width: 25%;
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 1rem;
            height: fit-content;
            position: sticky;
            top: 100px;
            border: 1px solid #333;
        }

        .sidebar_add h2 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: #bb86fc;
            text-align: center;
        }

        .form_group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form_group label {
            font-size: 0.9rem;
            color: #b0b0b0;
        }

        .form_group input,
        .form_group textarea,
        .form_group select {
            background-color: #2c2c2c;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.6rem;
            color: white;
            outline: none;
        }

        .btn_guardar {
            width: 100%;
            padding: 0.8rem;
            background-color: #03dac6;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .btn_guardar:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .divider {
            height: 1px;
            background-color: #333;
            margin: 2rem 0;
        }

        .sync_section {
            text-align: center;
        }

        .sync_section p {
            font-size: 0.8rem;
            color: #b0b0b0;
            margin-bottom: 1rem;
        }

        .btn_sync {
            width: 100%;
            padding: 0.8rem;
            background-color: #bb86fc;
            color: #121212;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn_sync:hover {
            background-color: #03dac6;
        }

        /* Products Grid Area */
        .main_productos {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main_productos h1 {
            margin-bottom: 2rem;
        }

        .contenedor_productos {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem;
            width: 100%;
        }

        .producto {
            position: relative;
            background-color: #1e1e1e;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 13rem;
            padding: 1.5rem 1rem;
            border-radius: 1rem;
            transition: border-color 0.3s;
        }

        .producto:hover {
            border-color: #bb86fc;
        }

        .producto img {
            width: 80%;
            height: 8rem;
            object-fit: contain;
            margin-bottom: 1rem;
        }

        .producto h2 {
            font-size: 1rem;
            text-align: center;
            margin-bottom: 0.5rem;
            height: 2.5rem;
            overflow: hidden;
        }

        .producto .precio {
            font-weight: bold;
            color: #bb86fc;
            margin-bottom: 1rem;
        }

        .product_actions {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0.5rem;
        }

        .btn_actualizar {
            background-color: #3700b3;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn_eliminar {
            background-color: #cf6679;
            color: black;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn_actualizar:hover,
        .btn_eliminar:hover {
            opacity: 0.8;
        }

        @media screen and (max-width: 1024px) {
            .admin_container {
                flex-direction: column;
            }

            .sidebar_add {
                width: 100%;
                position: static;
            }
        }
    </style>

    <script src="./BD/productos.js"></script>
    <script>
        const contenedor = document.getElementById('contenedor-productos');
        const formNuevo = document.getElementById('form-nuevo-producto');
        const inputBuscar = document.getElementById('input-buscar');
        const btnBuscar = document.getElementById('btn-buscar');

        function mostrarProductos(lista = productos) {
            contenedor.innerHTML = '';
            if (lista.length === 0) {
                contenedor.innerHTML = '<p>No se encontraron productos.</p>';
                return;
            }

            lista.forEach(producto => {
                const div = document.createElement('div');
                div.className = 'producto';
                div.innerHTML = `
                    <img src="${producto.portada}" alt="${producto.nombre}">
                    <h2>${producto.nombre}</h2>
                    <p class="precio">$${producto.precio}</p>
                    <div class="product_actions">
                        <button class="btn_actualizar" onclick="actualizarPrecio(${producto.id})">ACTUALIZAR PRECIO</button>
                        <button class="btn_eliminar" onclick="eliminarProducto(${producto.id})">ELIMINAR</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });
        }

        // AGREGAR PRODUCTO
        formNuevo.addEventListener('submit', (e) => {
            e.preventDefault();

            const nuevo = {
                id: Date.now(), // Generamos un ID único temporal
                nombre: document.getElementById('add-nombre').value,
                precio: parseFloat(document.getElementById('add-precio').value),
                portada: document.getElementById('add-imagen').value,
                codigo_barras: document.getElementById('add-codigo').value,
                categoria: document.getElementById('add-categoria').value,
                descripcion: document.getElementById('add-descripcion').value
            };

            productos.push(nuevo);
            guardarYRefrescar();
            formNuevo.reset();
            alert("Producto agregado con éxito");
        });

        // ELIMINAR PRODUCTO
        function eliminarProducto(id) {
            if (confirm("¿Estás seguro de que deseas eliminar este producto?")) {
                const index = productos.findIndex(p => p.id === id);
                if (index !== -1) {
                    productos.splice(index, 1);
                    guardarYRefrescar();
                }
            }
        }

        // ACTUALIZAR PRECIO
        function actualizarPrecio(id) {
            const producto = productos.find(p => p.id === id);
            const nuevoPrecio = prompt(`Ingrese el nuevo precio para ${producto.nombre}:`, producto.precio);

            if (nuevoPrecio !== null && !isNaN(nuevoPrecio)) {
                producto.precio = parseFloat(nuevoPrecio);
                guardarYRefrescar();
            }
        }

        // BUSCAR
        function buscar() {
            const termino = inputBuscar.value.toLowerCase().trim();
            const filtrados = productos.filter(p =>
                p.nombre.toLowerCase().includes(termino) ||
                p.codigo_barras.includes(termino)
            );
            mostrarProductos(filtrados);
            document.getElementById('titulo-gestion').innerText = termino ? `Resultados: "${termino}"` : "Gestión de Inventario";
        }

        function guardarYRefrescar() {
            localStorage.setItem('productos', JSON.stringify(productos));
            mostrarProductos();
        }

        async function sincronizarArchivoJS() {
            try {
                // Solicitar al usuario que seleccione el archivo productos.js
                const [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'Archivo de Productos JavaScript',
                        accept: { 'application/javascript': ['.js'] },
                    }],
                    excludeAcceptAllOption: true,
                    multiple: false
                });

                // Crear el contenido del archivo con el array actual
                const contenido = `const initialProductos = ${JSON.stringify(productos, null, 4)};\n\nlet productos = JSON.parse(localStorage.getItem('productos')) || initialProductos;\n\nif (!localStorage.getItem('productos')) {\n    localStorage.setItem('productos', JSON.stringify(productos));\n}`;

                // Escribir en el archivo
                const writable = await fileHandle.createWritable();
                await writable.write(contenido);
                await writable.close();

                alert('¡El archivo productos.js ha sido actualizado permanentemente!');
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    alert('No se pudo actualizar el archivo. Revisa los permisos de tu navegador.');
                }
            }
        }

        btnBuscar.addEventListener('click', buscar);
        inputBuscar.addEventListener('keyup', (e) => { if (e.key === 'Enter') buscar(); });

        // Inicializar
        mostrarProductos();
    </script>
</body>

</html>
